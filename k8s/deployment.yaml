apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-processor
  namespace: default
  labels:
    app: review-processor
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: review-processor
  template:
    metadata:
      labels:
        app: review-processor
    spec:
      containers:
        - name: review-processor
          image: review-processor:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
