apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'review-processor'
        static_configs:
          - targets: ['review-processor-service:80']
        metrics_path: '/metrics'
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
